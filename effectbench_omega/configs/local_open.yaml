    output_prefix: smoke_mc_default
    rows_per_model: 21
    required_failures: 0
    required_no_oracle_pass_rate: 1.0
    required_parse_status: json
    required_empty_repair_log: true
    required_structured_output_fallback_errors: 0
  prompt_fairness_invariant: "Every local model receives the same system prompt, task context, user-turn rendering, action enum, terminal_action requirement, temperature, and max token budget. Mistral uses tool-call transport because that is its official vLLM structured-output path; Qwen/Llama/Gemma use response_format=json_schema."
