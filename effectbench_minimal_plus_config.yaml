experiment_name: effectbench_minimal_plus_astar_2026
snapshot_date: 2026-06-22
random_seed_manifest: 20260622
owner_goal: "10 days of experiments, then freeze and revise for EACL/AAAI-class main-track submission"

venue_strategy:
  primary: EACL_2027_via_ARR_August_2026
  primary_deadline: "2026-08-03 AoE"
  aggressive: AAAI_27_Main_or_AI_Alignment
  aggressive_abstract_deadline: "2026-07-21 AoE"
  aggressive_full_deadline: "2026-07-28 AoE"
  aggressive_supplement_code_deadline: "2026-07-31 AoE"
  fallback_after_rejection: ARR_October_2026_or_AAMAS_2027_Main

claims_kept:
  - final_state_success_overstates_least_effect_success
  - effect_kernel_certificates_are_auditable_trace_semantics
  - projected_safeguards_leave_residual_strict_excess
  - effectguard_reduces_strict_excess_with_no_oracle_access
  - incomparability_is_reported_separately_from_strict_excess
  - cegar_abstraction_audit_prevents_false_minimality
  - lattice_sensitivity_does_not_destroy_main_claim
  - compact_reviewer_bundles_plus_full_machine_certificates
  - frontier_stress_probe_shows_gap_not_only_small_model_artifact

claims_removed_or_demoted:
  - STaRK_main_results
  - human_eval_F1_table
  - 204800_primary_episodes
  - 20480_frontier_focused_episodes
  - eight_model_leaderboard
  - Gemini_results
  - broad_all_recent_systems_SOTA_claim
  - claim_that_acceptance_is_guaranteed

headline_denominator:
  description: "Minimal-plus main denominator. Frontier block is separate and not mixed into headline means."
  base_tasks_total: 160
  task_families:
    tau_retail_or_tau3_retail: 32
    tau_airline_or_tau3_airline: 32
    tau2_or_tau3_telecom: 32
    delegated_docs: 32
    toolsandbox_contract: 32
  regimes:
    - FULL
    - CONCAT
    - SHARDED
    - SNOWBALL
    - REVISE
    - MEMORY_REVISE
    - ADV_EFFECT
  omitted_regimes:
    RECAP: "skip for 10-day budget; conceptually between SHARDED and SNOWBALL; mention as limitation"
  scenario_seeds: [13, 47]
  models:
    - qwen3_30b_a3b_local
    - qwen3_235b_a22b_2507_bedrock
    - deepseek_v3_2_bedrock
    - gpt_5_4_bedrock
  online_systems:
    - BASE
    - PROJ_GUARD
    - EFFECTGUARD
  formula: "160 tasks × 7 regimes × 2 seeds × 4 models × 3 systems"
  online_episode_count: 26880
  per_system_episode_count: 8960
  local_episode_count: 6720
  paid_api_episode_count: 20160
  paid_api_episodes_per_main_paid_model: 6720

focused_frontier_block:
  include: true
  status: "appendix/stress-test only; never pool with headline denominator"
  purpose: "Test whether a stronger frontier model closes the raw-vs-kernel gap on hard regimes."
  task_sample_total: 64
  task_family_sample:
    tau_retail_or_tau3_retail: 16
    tau_airline_or_tau3_airline: 16
    tau2_or_tau3_telecom: 12
    delegated_docs: 12
    toolsandbox_contract: 8
  regimes:
    - SNOWBALL
    - MEMORY_REVISE
    - ADV_EFFECT
  scenario_seeds: [13, 47]
  models:
    - gpt_5_5_bedrock
    - claude_opus_4_8_bedrock
  systems:
    - BASE
    - EFFECTGUARD
  formula: "64 tasks × 3 regimes × 2 seeds × 2 models × 2 systems"
  online_episode_count: 1536
  paid_api_episode_count: 1536
  paid_api_episodes_per_focused_model: 768
  allowed_claim: "Frontier stress probe; not a full leaderboard."
  forbidden_claims:
    - "SOTA frontier ranking"
    - "all frontier models tested"
    - "frontier block included in primary means"

